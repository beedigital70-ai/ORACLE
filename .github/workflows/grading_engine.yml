name: AI Sports Grading Engine

on:
  schedule:
    # Run at 23:00 NY time every day (03:00 UTC next day)
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  run-grading:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: cd backend && npm install

      - name: Run Grading Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SPORTS_API_KEY: ${{ secrets.SPORTS_API_KEY }}
        run: cd backend && node scripts/grade.js
